<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pibooth - Configuration</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .config-section {
            background: #222;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e94560;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            text-transform: uppercase;
        }
        .config-item {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .config-item label {
            font-size: 14px;
            color: #fff;
            font-weight: 600;
        }
        .config-item .desc {
            font-size: 12px;
            color: #888;
            line-height: 1.4;
        }
        .config-item input[type="text"], 
        .config-item input[type="number"],
        .config-item select {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .config-item input:focus {
            border-color: #e94560;
            outline: none;
        }
        
        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #4ade80; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Color Picker Row */
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid #444;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        .color-preview input[type="color"] {
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .actions-bar {
            position: sticky;
            bottom: 0;
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        .btn-save { background: #4ade80; color: #111; flex: 2; font-weight: bold; }
        .btn-restart { background: #e94560; color: #fff; flex: 1; }
    </style>
</head>
<body>
    <div class="app">
        <div class="gal-header">
            <button class="gal-back" onclick="window.location.href='/'">← Retour</button>
            <h2>Configuration</h2>
        </div>

        <div style="padding: 16px; padding-bottom: 100px;" id="configContainer">
            <p style="text-align:center; opacity:0.5;">Chargement de la configuration...</p>
        </div>

        <div class="actions-bar">
            <button class="nav-btn btn-save" style="margin:0" onclick="saveConfig()">ENREGISTRER</button>
            <button class="nav-btn btn-restart" style="margin:0" onclick="restartPibooth()">REDÉMARRER</button>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        let currentConfig = {};
        let descriptions = {};

        function toast(text) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function loadConfig() {
            fetch('/api/config')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        currentConfig = data.config;
                        descriptions = data.descriptions || {};
                        renderConfig();
                    } else {
                        toast('❌ ' + data.error);
                    }
                })
                .catch(() => toast('❌ Erreur de chargement'));
        }

        function parseRGB(str) {
            const m = str.match(/\((\d+),\s*(\d+),\s*(\d+)\)/);
            if (m) return { r: parseInt(m[1]), g: parseInt(m[2]), b: parseInt(m[3]) };
            return null;
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function hexToRGB(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `(${r}, ${g}, ${b})`;
        }

        function renderConfig() {
            const container = document.getElementById('configContainer');
            container.innerHTML = '';

            // All sections from the .cfg
            const sections = Object.keys(currentConfig);
            
            sections.forEach(section => {
                const div = document.createElement('div');
                div.className = 'config-section';
                
                let html = `<div class="section-title">${section}</div>`;
                
                for (const [key, value] of Object.entries(currentConfig[section])) {
                    const desc = (descriptions[section] && descriptions[section][key]) ? descriptions[section][key] : '';
                    let inputHtml = '';

                    // Smart Input Logic
                    if (value.toLowerCase() === 'true' || value.toLowerCase() === 'false') {
                        const checked = value.toLowerCase() === 'true' ? 'checked' : '';
                        inputHtml = `
                            <label class="switch">
                                <input type="checkbox" data-section="${section}" data-key="${key}" ${checked}>
                                <span class="slider"></span>
                            </label>
                        `;
                    } else if (parseRGB(value)) {
                        const rgb = parseRGB(value);
                        const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
                        inputHtml = `
                            <div class="color-row">
                                <div class="color-preview" style="background: ${hex}">
                                    <input type="color" value="${hex}" onchange="updateColor(this)">
                                </div>
                                <input type="text" data-section="${section}" data-key="${key}" value="${value}" style="flex:1">
                            </div>
                        `;
                    } else if (key === 'language') {
                        const langs = ['en', 'fr', 'de', 'es', 'it', 'nl', 'no', 'pt', 'se', 'dk', 'hu', 'br'];
                        inputHtml = `<select data-section="${section}" data-key="${key}">`;
                        langs.forEach(l => {
                            inputHtml += `<option value="${l}" ${value === l ? 'selected' : ''}>${l.toUpperCase()}</option>`;
                        });
                        inputHtml += `</select>`;
                    } else {
                        inputHtml = `<input type="text" data-section="${section}" data-key="${key}" value="${value.replace(/"/g, '"')}">`;
                    }

                    html += `
                        <div class="config-item">
                            <label>${key}</label>
                            ${desc ? `<div class="desc">${desc}</div>` : ''}
                            ${inputHtml}
                        </div>
                    `;
                }
                
                div.innerHTML = html;
                container.appendChild(div);
            });
        }

        function updateColor(el) {
            const hex = el.value;
            const rgb = hexToRGB(hex);
            const textInput = el.closest('.color-row').querySelector('input[type="text"]');
            textInput.value = rgb;
            el.parentElement.style.background = hex;
        }

        function saveConfig() {
            const newConfig = JSON.parse(JSON.stringify(currentConfig));

            // Collect Checkboxes (Booleans)
            document.querySelectorAll('input[type="checkbox"]').forEach(input => {
                newConfig[input.dataset.section][input.dataset.key] = input.checked ? 'True' : 'False';
            });

            // Collect Selects
            document.querySelectorAll('select').forEach(select => {
                newConfig[select.dataset.section][select.dataset.key] = select.value;
            });

            // Collect Text Inputs
            document.querySelectorAll('input[type="text"]').forEach(input => {
                newConfig[input.dataset.section][input.dataset.key] = input.value;
            });

            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ config: newConfig })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    toast('✅ Configuration enregistrée !');
                    currentConfig = newConfig;
                } else {
                    toast('❌ ' + data.error);
                }
            })
            .catch(() => toast('❌ Erreur réseau'));
        }

        function restartPibooth() {
            if (!confirm('Redémarrer Pibooth ? Cela coupera la connexion quelques instants.')) return;
            
            fetch('/api/action/restart', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    toast('🔄 Redémarrage en cours...');
                    setTimeout(() => window.location.href = '/', 5000);
                } else {
                    toast('❌ ' + data.error);
                }
            })
            .catch(() => toast('❌ Erreur réseau'));
        }

        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
</body>
</html>
